<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2c66"/>
      <stop offset="1" stop-color="#0c3a86"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2070d6"/>
      <stop offset="1" stop-color="#2a4fc6"/>
